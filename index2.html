<!DOCTYPE html>
<html>
<head>
    <title>Test Guardar</title>
</head>
<body>
    <h2>Guardar puntaje en Supabase</h2>
    <input type="text" id="nombre" placeholder="Tu nombre">
    <input type="number" id="puntaje" placeholder="Puntaje (0-10)">
    <button onclick="guardar()">Guardar</button>
    <pre id="resultado"></pre>

    <script>
        const URL = "https://elwipexzqkurxwwoeinu.supabase.co";
        const KEY = "sb_publishable_kvGTcCJso1mSKKlY3EYUPg_h15h7CMM";

        async function guardar() {
            const nombre = document.getElementById('nombre').value;
            const puntaje = parseInt(document.getElementById('puntaje').value);
            
            const resultado = document.getElementById('resultado');
            resultado.innerHTML = "Guardando...";
            
            try {
                const response = await fetch(URL + "/scores", {
                    method: 'POST',
                    headers: {
                        'apikey': KEY,
                        'Authorization': 'Bearer ' + KEY,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ name: nombre, score: puntaje })
                });
                
                if (response.ok) {
                    resultado.innerHTML = "✅ Guardado exitoso!";
                    // Ver qué hay en la tabla
                    const ver = await fetch(URL + "/scores?select=*", {
                        headers: { 'apikey': KEY, 'Authorization': 'Bearer ' + KEY }
                    });
                    const datos = await ver.json();
                    resultado.innerHTML = "✅ Guardado exitoso!\n\nTabla actual:\n" + JSON.stringify(datos, null, 2);
                } else {
                    const error = await response.text();
                    resultado.innerHTML = "❌ Error: " + error;
                }
            } catch(err) {
                resultado.innerHTML = "❌ Error: " + err.message;
            }
        }
    </script>
</body>
</html>
